<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PCAPLens{% endblock %}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #388bfd;
            --danger: #f85149;
            --warning: #e3b341;
            --success: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        header {
            background: #010409;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
        .logo:hover { text-decoration: none; opacity: 0.85; }
        .tagline { color: var(--muted); font-size: 13px; }
        main { padding: 28px 24px; max-width: 1400px; margin: 0 auto; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            background: var(--surface2);
            color: var(--muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 7px 12px;
            border-bottom: 1px solid var(--border);
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            word-break: break-all;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        tr.suspicious td { color: var(--danger); }
        tr.suspicious td:first-child::before { content: '⚑ '; }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
        }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: monospace; }
        .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
        .section-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
        .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            vertical-align: middle;
        }
        .badge-danger { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.3); }
        .flag-tag {
            display: inline-block;
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            color: var(--danger);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 11px;
            font-family: monospace;
            margin: 1px 2px 1px 0;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="logo">PCAPLens</a>
        <span class="tagline">PCAP Analysis for SOC Analysts</span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
